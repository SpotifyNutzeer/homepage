server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types
    text/plain text/css text/javascript application/javascript application/json
    image/svg+xml application/xml application/rss+xml font/ttf font/otf;
  gzip_vary on;
  gzip_min_length 1024;

  # Security headers must be re-included in any location block that has its
  # own add_header — nginx does not inherit add_header across contexts.
  include /etc/nginx/conf.d/security.inc;

  location ^~ /_astro/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    include /etc/nginx/conf.d/security.inc;
  }

  location ~ \.html$ {
    add_header Cache-Control "public, max-age=300, must-revalidate" always;
    include /etc/nginx/conf.d/security.inc;
  }

  location / {
    try_files $uri $uri/ $uri.html =404;
  }

  error_page 404 /404.html;
  location = /404.html {
    internal;
  }
}
